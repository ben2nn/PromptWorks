services:
  postgres:
    image: postgres:15-alpine
    container_name: promptworks-postgres
    environment:
      POSTGRES_DB: promptworks
      POSTGRES_USER: promptworks
      POSTGRES_PASSWORD: promptworks
    ports:
      - "15432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptworks -d promptworks"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: promptworks-redis
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: promptworks-backend
    env_file:
      - .env.docker
    environment:
      # 覆盖特定的环境变量（如果需要）
      DATABASE_URL: postgresql+psycopg://promptworks:promptworks@postgres:5432/promptworks
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./data/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://backend:8000/api/v1
    container_name: promptworks-frontend
    environment:
      VITE_API_BASE_URL: http://backend:8000/api/v1
    depends_on:
      backend:
        condition: service_started
    ports:
      - "18080:80"

  gallery:
    build:
      context: ./gallery
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://192.168.31.222:8000
    container_name: promptworks-gallery
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://192.168.31.222:8000
    depends_on:
      backend:
        condition: service_started
    ports:
      - "18081:80"

